sonar.projectKey=secure-audit-lab
sonar.projectName=Secure Audit Lab
sonar.projectVersion=1.0.0

# Organización de SonarCloud
sonar.organization=jr4mx

# ========================================
# FUENTES DE CÓDIGO
# ========================================
sonar.sources=.
sonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx
sonar.exclusions=node_modules/**,.*/**,**/*.spec.js,**/*.test.js,.git/**,logs/**,dist/**,build/**,coverage/**

sonar.language=js
sonar.sourceEncoding=UTF-8

# ========================================
# IMPORTAR REPORTES EXTERNOS
# ========================================
# Importar múltiples reportes (ESLint + vulnerabilidades personalizadas)
sonar.externalIssuesReportPaths=eslint-report.json,security-report.sarif

# ========================================
# CONFIGURACIÓN DE SEGURIDAD
# ========================================
sonar.security.hotspots.enabled=true
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# ========================================
# COBERTURA
# ========================================
sonar.coverage.exclusions=node_modules/**,**/*.test.js,**/*.spec.js