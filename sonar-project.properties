sonar.projectKey=secure-audit-lab
sonar.projectName=Secure Audit Lab
sonar.projectVersion=1.0.0

# Organización de SonarCloud (reemplaza con tu organización)
sonar.organization=jr4mx

# Directorios de código fuente (todo el proyecto)
sonar.sources=.

# Lenguaje principal
sonar.language=js

# Configuración de codificación
sonar.sourceEncoding=UTF-8

# Excluir directorios de análisis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,.git/**,.github/**,logs/**

# Cobertura de código (opcional)
sonar.coverage.exclusions=**/node_modules/**,**/test/**

# ========================================
# CONFIGURACIÓN DE SEGURIDAD
# ========================================
# Habilitar análisis de Security Hotspots
sonar.security.hotspots.enabled=true

# Aumentar severidad de issues de seguridad para detectar vulnerabilidades
sonar.issue.severity=blocker,critical,major,minor,info

# Incluir TypeScript y JavaScript
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx

# Máximo tamaño de nodo para análisis
sonar.javascript.node.maxspace=4096
