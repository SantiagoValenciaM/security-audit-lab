name: SonarQube Analysis

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint with JSON report
        continue-on-error: true
        run: |
          npx eslint . --format json --output-file eslint-report.json --ext .js,.jsx || true
          test -f eslint-report.json || echo '[]' > eslint-report.json

      - name: Convert custom vulnerabilities to SARIF
        run: |
          node -e '
          const fs = require("fs");
          
          // Leer vulnerabilidades
          const vulnData = JSON.parse(fs.readFileSync("vulnerabilities.json", "utf8"));
          
          // Crear SARIF
          const sarif = {
            version: "2.1.0",
            runs: [{
              tool: { driver: { 
                name: "Custom Security Scanner",
                rules: vulnData.vulnerabilities.map(v => ({
                  id: v.id,
                  shortDescription: { text: v.type },
                  fullDescription: { text: v.description },
                  properties: { cwe: v.cwe }
                }))
              }},
              results: vulnData.vulnerabilities.map(v => ({
                ruleId: v.id,
                level: v.severity === "CRITICAL" ? "error" : (v.severity === "HIGH" ? "error" : "warning"),
                message: { text: `${v.description} - Remediation: ${v.remediation}` },
                locations: [{
                  physicalLocation: {
                    artifactLocation: { uri: v.file },
                    region: { startLine: v.line }
                  }
                }]
              }))
            }]
          };
          
          fs.writeFileSync("security-report.sarif", JSON.stringify(sarif, null, 2));
          console.log("✅ SARIF report created");
          '

      - name: Run custom vulnerability analysis
        continue-on-error: true
        run: npm run analyze-vuln || true

      - name: Run full security check
        continue-on-error: true
        run: npm run security || true

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.externalIssuesReportPaths=eslint-report.json,security-report.sarif